image:
  name: docker:24.0
services:
  - docker:24.0-dind

before_script:
  - echo "$DOCKERHUB_TOKEN" | docker login --username $DOCKERHUB_USER --password-stdin

stages:
  - Test and Lint
  - Build and Push

Python_Checker:
  stage: Test and Lint
  script:
    - docker compose run --rm app sh -c "python manage.py wait_for_db && python manage.py test"
    - docker compose run --rm app sh -c "flake8"
  # Trigger When:
  # Merge request to main or prod
  # Direct push/commit to main or prod branch
  rules:
    - if: "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(main|prod)$/ || $CI_COMMIT_BRANCH =~ /^(main|prod)$/"

Terraform Checks:
  stage: Test and Lint
  script:
    - cd Terraform
    # backend=false Testing configuration without state management
    - docker compose run --rm terraform -chdir=SetUp/ init -backend=false
    - docker compose run --rm terraform -chdir=Deploy/ init -backend=false
    - docker compose run --rm terraform -chdir=Deploy/ validate
    - docker compose run --rm terraform -chdir=Deploy/ fmt
    - docker compose run --rm terraform -chdir=SetUp/ fmt
    - docker compose run --rm terraform -chdir=Deploy/ fmt -check
    - docker compose run --rm terraform -chdir=SetUp/ validate
    # -check: Check mode - returns exit code instead of modifying files
    - docker compose run --rm terraform -chdir=SetUp/ fmt -check
  rules:
    - if: "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(main|prod)$/ || $CI_COMMIT_BRANCH =~ /^(main|prod)$/"


push to ECR:
  stage: Build and Push
  script:
    - apk update && apk add aws-cli
    - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com