services:
  terraform:
    image: hashicorp/terraform
    volumes:
      - ./SetUp:/tf/SetUp
      - ./Deploy:/tf/Deploy
    working_dir: /tf
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}  # Optional for temporary credentials
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      # Terraform Variables
      - TF_VAR_region=${AWS_REGION}
      - TF_VAR_environment=${ENVIRONMENT}
      - TF_VAR_project_name=${PROJECT_NAME}
      - TF_WORKSPACE=${TF_WORKSPACE}
      - TF_VAR_db_password=${TF_VAR_db_password}
      - TF_VAR_ecr_proxy_image=165576755593.dkr.ecr.us-east-1.amazonaws.com/big-pro-api-proxy:latest
      - TF_VAR_django_secret_key=${TF_VAR_django_secret_key}
      - TF_VAR_ecr_app_image=165576755593.dkr.ecr.us-east-1.amazonaws.com/big-pro-api-app:latest